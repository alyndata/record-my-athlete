name: EAS Build

# Trigger builds from the GitHub "Actions" tab (no local terminal needed).
# Requires a repository secret named EXPO_TOKEN (see README → "Building from GitHub").
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - ios
          - android
          - all
        default: ios
      profile:
        description: Build profile
        type: choice
        options:
          - preview
          - production
        default: preview

jobs:
  build:
    name: Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS build
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
