name: EAS Build

# Trigger builds from the GitHub "Actions" tab (no local terminal needed).
# Requires a repository secret named EXPO_TOKEN (see README → "Building from GitHub").
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - ios
          - android
          - all
        default: ios
      profile:
        description: Build profile
        type: choice
        options:
          - preview
          - production
        default: preview
      submit:
        description: Submit to TestFlight / Play after building (iOS needs profile=production)
        type: boolean
        default: false

jobs:
  build:
    name: Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (and optionally submit)
        run: |
          if [ "${{ inputs.submit }}" = "true" ]; then
            eas build \
              --platform ${{ inputs.platform }} \
              --profile ${{ inputs.profile }} \
              --non-interactive \
              --auto-submit
          else
            eas build \
              --platform ${{ inputs.platform }} \
              --profile ${{ inputs.profile }} \
              --non-interactive \
              --no-wait
          fi
