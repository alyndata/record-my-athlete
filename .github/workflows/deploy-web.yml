name: Deploy Web

# Builds the web app and publishes it to the gh-pages branch, which GitHub
# Pages serves at https://alyndata.github.io/record-my-athlete/.
# (Branch-based Pages avoids the Actions "github-pages" environment gate.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & publish web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Keep _expo/ assets servable (disables Jekyll, writes .nojekyll).
          enable_jekyll: false
